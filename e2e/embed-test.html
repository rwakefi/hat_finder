<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hat Finder embed test (local)</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      background: #f3f0ea;
      color: #2d2926;
    }
    .mock-header {
      padding: 14px 24px;
      background: linear-gradient(#3a2e28, #2d2926);
      color: #fff;
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    .mock-page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px 48px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.5rem, 3vw, 2rem);
      font-weight: 600;
    }
    p.lead {
      margin: 0 0 24px;
      color: rgba(45, 41, 38, 0.72);
      line-height: 1.5;
    }
    .frame {
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(45, 41, 38, 0.08);
      box-shadow: 0 8px 28px rgba(45, 41, 38, 0.08);
      background: #faf8f5;
    }
    iframe {
      display: block;
      width: 100%;
      height: 920px;
      border: 0;
      background: #faf8f5;
    }
    .links {
      margin-top: 16px;
      font-size: 14px;
    }
    .links a { color: #2d2926; }
  </style>
</head>
<body>
  <div class="mock-header">Moon Ridge — mock store header</div>
  <div class="mock-page">
    <h1>Find Your Perfect Hat</h1>
    <p class="lead">This page simulates the Shopify embed. The iframe should fill the box with no side boards.</p>
    <div class="frame">
      <iframe
        src="http://127.0.0.1:8080/?embed=1"
        title="Moon Ridge Hat Finder"
        loading="lazy"
      ></iframe>
    </div>
    <p class="links">
      Compare:
      <a href="http://127.0.0.1:8080/" target="_blank" rel="noopener">standalone (with store chrome)</a>
      ·
      <a href="http://127.0.0.1:8080/?embed=1" target="_blank" rel="noopener">embed URL only</a>
    </p>
  </div>
</body>
</html>
