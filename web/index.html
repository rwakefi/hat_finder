<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Find your perfect hat with Moon Ridge Hat Finder — match crown, brim, and style to your head shape.">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Moon Ridge Hat Finder">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Moon Ridge Hat Finder</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #F3F0EA;
    }
    .boot-loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #2D2926;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 12px;
      background: #F3F0EA;
      transition: opacity 240ms ease;
    }
    .boot-loader.is-hidden {
      opacity: 0;
      pointer-events: none;
    }
    .boot-spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(45, 41, 38, 0.15);
      border-top-color: #559C99;
      border-radius: 50%;
      animation: boot-spin 0.8s linear infinite;
    }
    @keyframes boot-spin {
      to { transform: rotate(360deg); }
    }
  </style>

  <script>
    (function () {
      function removeLoader() {
        var loader = document.getElementById('boot-loader');
        if (!loader || loader.dataset.removed) return;
        loader.dataset.removed = '1';
        loader.classList.add('is-hidden');
        setTimeout(function () {
          loader.remove();
        }, 280);
      }

      window.addEventListener('flutter-first-frame', removeLoader);

      function watchForFlutterMount() {
        if (document.querySelector('flt-glass-pane, flutter-view, flt-scene-host')) {
          removeLoader();
          return;
        }
        var observer = new MutationObserver(function () {
          if (document.querySelector('flt-glass-pane, flutter-view, flt-scene-host')) {
            removeLoader();
            observer.disconnect();
          }
        });
        observer.observe(document.body, { childList: true, subtree: true });
        setTimeout(function () {
          observer.disconnect();
          removeLoader();
        }, 30000);
      }

      if (document.body) {
        watchForFlutterMount();
      } else {
        document.addEventListener('DOMContentLoaded', watchForFlutterMount);
      }
    })();
  </script>
</head>
<body>
  <div class="boot-loader" id="boot-loader">
    <span>Loading Hat Finder…</span>
    <span class="boot-spinner" aria-hidden="true"></span>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
