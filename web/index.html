<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Find your perfect hat with Moon Ridge Hat Finder — match crown, brim, and style to your head shape.">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Moon Ridge Hat Finder">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Moon Ridge Hat Finder</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #F3F0EA;
    }
    .boot-loader {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #2D2926;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="boot-loader" id="boot-loader">Loading Hat Finder…</div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var loader = document.getElementById('boot-loader');
      if (loader) loader.remove();
    });
  </script>
</body>
</html>
